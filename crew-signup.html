<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>FilmFlow - Join Production</title>

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #ff2d55;
        --primary-dark: #e61e44;
        --secondary: #ffd60a;
        --dark: #1c1c1e;
        --medium: #2c2c2e;
        --light: #f2f2f7;
        --text: #ffffff;
        --text-muted: #98989d;
        --success: #30d158;
        --warning: #ff9f0a;
        --danger: #ff453a;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--dark);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
      }

      /* Header */
      .header {
        background: linear-gradient(135deg, var(--primary) 0%, #ff6b6b 100%);
        padding: 1.5rem;
        text-align: center;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .header h1 i {
        margin-right: 10px;
      }

      /* Project Banner */
      .project-banner {
        background: var(--medium);
        padding: 1.5rem;
        border-bottom: 3px solid var(--secondary);
        text-align: center;
      }

      .project-name {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--secondary);
        margin-bottom: 0.5rem;
      }

      .project-dates {
        color: var(--text-muted);
        font-size: 1rem;
      }

      .project-dates i {
        margin-right: 5px;
      }

      /* Main Container */
      .container {
        padding: 1.5rem;
        max-width: 600px;
        margin: 0 auto;
      }

      /* Cards */
      .card {
        background: var(--medium);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .card-title {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: var(--secondary);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Forms */
      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--secondary);
      }

      label i {
        margin-right: 5px;
        color: var(--primary);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        background: var(--dark);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 1rem;
        transition: all 0.2s;
        -webkit-appearance: none;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 45, 85, 0.2);
      }

      /* Checkbox Grid */
      .checkbox-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        margin-top: 0.5rem;
      }

      .checkbox-item {
        background: var(--dark);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .checkbox-item:hover {
        border-color: var(--primary);
      }

      .checkbox-item input[type="checkbox"] {
        width: auto;
        margin-right: 0.5rem;
        accent-color: var(--primary);
      }

      /* Date Grid */
      .date-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      .date-item {
        background: var(--dark);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0.75rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .date-item.selected {
        background: var(--primary);
        border-color: var(--primary);
      }

      .date-item .day {
        font-weight: 700;
        font-size: 1.1rem;
      }

      .date-item .weekday {
        font-size: 0.7rem;
        color: var(--text-muted);
      }

      .date-item.selected .weekday {
        color: rgba(255, 255, 255, 0.8);
      }

      /* Buttons */
      .btn {
        width: 100%;
        padding: 1rem;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 45, 85, 0.3);
      }

      .btn-success {
        background: var(--success);
        color: white;
      }

      /* Success Screen */
      .success-screen {
        text-align: center;
        padding: 2rem 1rem;
      }

      .success-icon {
        font-size: 4rem;
        color: var(--success);
        margin-bottom: 1rem;
      }

      .success-title {
        font-size: 2rem;
        font-weight: 800;
        color: var(--success);
        margin-bottom: 1rem;
      }

      .success-message {
        color: var(--text-muted);
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 3rem;
      }

      .loading i {
        font-size: 2rem;
        color: var(--primary);
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Profile Preview */
      .profile-preview {
        background: var(--dark);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        border-left: 4px solid var(--secondary);
      }

      .profile-preview h3 {
        color: var(--secondary);
        margin-bottom: 0.5rem;
      }

      .profile-preview p {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .form-row {
          grid-template-columns: 1fr;
        }

        .checkbox-grid {
          grid-template-columns: 1fr;
        }

        .date-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Header -->
      <div class="header">
        <h1><i class="fas fa-film"></i> FilmFlow</h1>
      </div>

      <!-- Dynamic Content -->
      <div id="main-content"></div>
    </div>

    <script>
      // ============================================
      // CONFIGURATION
      // ============================================
      const API_BASE_URL = "https://filmflow-api.onrender.com/api";

      // ============================================
      // STATE
      // ============================================
      let projectCode = null;
      let project = null;
      let existingProfile = null;
      let selectedDates = [];
      let formData = {
        full_name: "",
        phone: "",
        email: "",
        department: "",
        emergency_name: "",
        emergency_phone: "",
        dietary_restrictions: [],
        address: "",
        union_status: "",
        has_insurance: false,
        insurance_expiry: "",
        certifications: [],
      };

      // Departments list
      const DEPARTMENTS = [
        "Camera",
        "Sound",
        "Grip",
        "Electric",
        "Art Department",
        "Wardrobe",
        "Hair & Makeup",
        "Production",
        "Directing",
        "Editing",
        "VFX",
        "Catering",
        "Transportation",
        "Locations",
        "Safety",
        "Script Supervisor",
        "Stunt Coordination",
        "Special Effects",
        "Props",
        "Set Decoration",
        "Construction",
      ];

      // Dietary options
      const DIETARY_OPTIONS = [
        "Vegetarian",
        "Vegan",
        "Gluten-Free",
        "Nut Allergy",
        "Dairy-Free",
        "Halal",
        "Kosher",
        "Shellfish Allergy",
      ];

      // ============================================
      // INITIALIZATION
      // ============================================
      document.addEventListener("DOMContentLoaded", async () => {
        // Get project code from URL
        const urlParams = new URLSearchParams(window.location.search);
        projectCode = urlParams.get("project");

        if (!projectCode) {
          showError("No project code provided. Please check your invite link.");
          return;
        }

        // Check if crew member is returning (check localStorage)
        const savedEmail = localStorage.getItem("filmflow_email");
        if (savedEmail) {
          await checkExistingProfile(savedEmail);
        }

        // Load project details
        await loadProject();
      });

      // ============================================
      // API CALLS
      // ============================================
      async function loadProject() {
        try {
          showLoading();

          const response = await fetch(
            `${API_BASE_URL}/projects/code/${projectCode}`,
          );
          const data = await response.json();

          if (data.error) {
            showError("Project not found. Please check your invite link.");
            return;
          }

          project = data.project;
          renderSignupForm();
        } catch (error) {
          console.error("Error loading project:", error);
          showError("Failed to load project. Please try again.");
        }
      }

      async function checkExistingProfile(email) {
        try {
          const response = await fetch(`${API_BASE_URL}/crew/check`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          const data = await response.json();

          if (data.exists) {
            existingProfile = data.profile;
            // Pre-fill form with existing data
            formData = {
              ...formData,
              full_name: existingProfile.full_name || "",
              phone: existingProfile.phone || "",
              email: existingProfile.email || "",
              department: existingProfile.department || "",
              emergency_name: existingProfile.emergency_name || "",
              emergency_phone: existingProfile.emergency_phone || "",
              dietary_restrictions: existingProfile.dietary_restrictions || [],
              address: existingProfile.address || "",
              union_status: existingProfile.union_status || "",
              has_insurance: existingProfile.has_insurance || false,
              insurance_expiry: existingProfile.insurance_expiry || "",
            };
          }
        } catch (error) {
          console.error("Error checking profile:", error);
        }
      }

      async function submitSignup() {
        try {
          showLoading();

          const response = await fetch(
            `${API_BASE_URL}/projects/${projectCode}/crew/signup`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                ...formData,
                available_dates: selectedDates,
                crew_id: existingProfile?.id,
              }),
            },
          );

          const data = await response.json();

          if (data.error) {
            alert(data.error);
            renderSignupForm();
            return;
          }

          // Save email for future
          localStorage.setItem("filmflow_email", formData.email);

          // Show success
          renderSuccess();
        } catch (error) {
          console.error("Error submitting signup:", error);
          alert("Failed to submit. Please try again.");
          renderSignupForm();
        }
      }

      // ============================================
      // RENDERING
      // ============================================
      function showLoading() {
        document.getElementById("main-content").innerHTML = `
                <div class="container">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p style="margin-top: 1rem; color: var(--text-muted);">Loading...</p>
                    </div>
                </div>
            `;
      }

      function showError(message) {
        document.getElementById("main-content").innerHTML = `
                <div class="container">
                    <div class="card" style="text-align: center; padding: 3rem;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--danger); margin-bottom: 1rem;"></i>
                        <h2 style="color: var(--danger); margin-bottom: 1rem;">Oops!</h2>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">${message}</p>
                        <button class="btn btn-primary" onclick="window.location.reload()">
                            <i class="fas fa-redo"></i> Try Again
                        </button>
                    </div>
                </div>
            `;
      }

      function renderSignupForm() {
        const content = document.getElementById("main-content");

        // Generate date options
        const dates = [];
        if (project && project.shoot_dates) {
          dates.push(...project.shoot_dates);
        }

        content.innerHTML = `
                <div class="project-banner">
                    <div class="project-name">${project?.name || "Loading..."}</div>
                    <div class="project-dates">
                        <i class="far fa-calendar-alt"></i> 
                        ${project ? formatDateRange(project.start_date, project.end_date) : ""}
                    </div>
                </div>

                <div class="container">
                    ${
                      existingProfile
                        ? `
                        <div class="profile-preview">
                            <h3><i class="fas fa-user-check"></i> Welcome Back!</h3>
                            <p>We've pre-filled your information from your previous signup. Please review and update if needed.</p>
                        </div>
                    `
                        : ""
                    }

                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-user"></i> Personal Information
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name *</label>
                            <input type="text" id="full_name" value="${formData.full_name}" placeholder="John Doe" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-phone"></i> Phone *</label>
                                <input type="tel" id="phone" value="${formData.phone}" placeholder="(555) 123-4567" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email *</label>
                                <input type="email" id="email" value="${formData.email}" placeholder="john@example.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-briefcase"></i> Department *</label>
                            <select id="department" required>
                                <option value="">Select your department...</option>
                                ${DEPARTMENTS.map(
                                  (dept) => `
                                    <option value="${dept}" ${formData.department === dept ? "selected" : ""}>${dept}</option>
                                `,
                                ).join("")}
                            </select>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-utensils"></i> Dietary Restrictions
                        </div>
                        
                        <div class="checkbox-grid">
                            ${DIETARY_OPTIONS.map(
                              (option) => `
                                <label class="checkbox-item">
                                    <input type="checkbox" 
                                           value="${option}" 
                                           ${formData.dietary_restrictions.includes(option) ? "checked" : ""}
                                           onchange="toggleDietary('${option}')">
                                    ${getDietaryIcon(option)} ${option}
                                </label>
                            `,
                            ).join("")}
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-calendar-check"></i> Your Availability
                        </div>
                        <p style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem;">
                            Select which days you're available to work:
                        </p>
                        
                        <div class="date-grid" id="date-grid">
                            ${dates
                              .map((date) => {
                                const dateObj = new Date(date);
                                const isSelected = selectedDates.includes(date);
                                return `
                                    <div class="date-item ${isSelected ? "selected" : ""}" 
                                         onclick="toggleDate('${date}')">
                                        <div class="day">${dateObj.getDate()}</div>
                                        <div class="weekday">${dateObj.toLocaleDateString("en-US", { weekday: "short" })}</div>
                                    </div>
                                `;
                              })
                              .join("")}
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-ambulance"></i> Emergency Contact
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>Emergency Contact Name</label>
                                <input type="text" id="emergency_name" value="${formData.emergency_name}" placeholder="Jane Doe">
                            </div>
                            <div class="form-group">
                                <label>Emergency Contact Phone</label>
                                <input type="tel" id="emergency_phone" value="${formData.emergency_phone}" placeholder="(555) 987-6543">
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-shield-alt"></i> Insurance & Union
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox-item" style="padding: 0; background: transparent;">
                                <input type="checkbox" id="has_insurance" ${formData.has_insurance ? "checked" : ""}>
                                <span>I have current production insurance</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label>Union Status (Optional)</label>
                            <input type="text" id="union_status" value="${formData.union_status}" placeholder="e.g., SAG-AFTRA, IATSE">
                        </div>

                        <div class="form-group">
                            <label>Address (Optional)</label>
                            <textarea id="address" rows="2" placeholder="Your address...">${formData.address}</textarea>
                        </div>
                    </div>

                    <button class="btn btn-success" onclick="handleSubmit()">
                        <i class="fas fa-paper-plane"></i> Submit & Join Production
                    </button>
                </div>
            `;
      }

      function renderSuccess() {
        document.getElementById("main-content").innerHTML = `
                <div class="container">
                    <div class="card success-screen">
                        <div class="success-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="success-title">You're In!</div>
                        <div class="success-message">
                            <p>Thank you for joining <strong>${project?.name}</strong>!</p>
                            <p style="margin-top: 1rem;">What happens next:</p>
                            <ul style="text-align: left; margin-top: 1rem; padding-left: 1.5rem;">
                                <li>The production team will assign you to specific shoot days</li>
                                <li>You'll receive call sheets via email when ready</li>
                                <li>You can update your profile anytime using the same link</li>
                            </ul>
                        </div>
                        <button class="btn btn-primary" onclick="window.location.href = window.location.pathname + '?project=${projectCode}'">
                                                        <i class="fas fa-redo"></i> Sign Up Another Crew Member
                        </button>
                    </div>
                </div>
            `;
      }

      // ============================================
      // HELPER FUNCTIONS
      // ============================================
      function formatDate(dateString) {
        return new Date(dateString).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function formatDateRange(start, end) {
        return `${formatDate(start)} - ${formatDate(end)}`;
      }

      function getDietaryIcon(diet) {
        const icons = {
          Vegetarian: "🥗",
          Vegan: "🌱",
          "Gluten-Free": "🌾",
          "Nut Allergy": "🥜",
          "Dairy-Free": "🥛",
          Halal: "☪️",
          Kosher: "✡️",
          "Shellfish Allergy": "🦐",
        };
        return icons[diet] || "📋";
      }

      // ============================================
      // EVENT HANDLERS
      // ============================================
      window.toggleDietary = (option) => {
        const index = formData.dietary_restrictions.indexOf(option);
        if (index === -1) {
          formData.dietary_restrictions.push(option);
        } else {
          formData.dietary_restrictions.splice(index, 1);
        }
      };

      window.toggleDate = (date) => {
        const index = selectedDates.indexOf(date);
        if (index === -1) {
          selectedDates.push(date);
        } else {
          selectedDates.splice(index, 1);
        }

        // Update UI
        const dateGrid = document.getElementById("date-grid");
        if (dateGrid) {
          const dateItems = dateGrid.children;
          for (let i = 0; i < dateItems.length; i++) {
            const item = dateItems[i];
            if (item.textContent.includes(new Date(date).getDate())) {
              item.classList.toggle("selected");
            }
          }
        }
      };

      window.handleSubmit = async () => {
        // Collect form data
        formData = {
          full_name: document.getElementById("full_name")?.value || "",
          phone: document.getElementById("phone")?.value || "",
          email: document.getElementById("email")?.value || "",
          department: document.getElementById("department")?.value || "",
          emergency_name:
            document.getElementById("emergency_name")?.value || "",
          emergency_phone:
            document.getElementById("emergency_phone")?.value || "",
          dietary_restrictions: formData.dietary_restrictions,
          address: document.getElementById("address")?.value || "",
          union_status: document.getElementById("union_status")?.value || "",
          has_insurance:
            document.getElementById("has_insurance")?.checked || false,
          insurance_expiry: "",
          certifications: [],
        };

        // Validate required fields
        if (
          !formData.full_name ||
          !formData.phone ||
          !formData.email ||
          !formData.department
        ) {
          alert("Please fill in all required fields");
          return;
        }

        // Validate email format
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(formData.email)) {
          alert("Please enter a valid email address");
          return;
        }

        // Submit
        await submitSignup();
      };
    </script>
  </body>
</html>
