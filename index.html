<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>FilmFlow Admin - Production Management</title>

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- Calendar Library -->
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #ff2d55;
        --primary-dark: #e61e44;
        --secondary: #ffd60a;
        --dark: #1c1c1e;
        --medium: #2c2c2e;
        --light: #f2f2f7;
        --text: #ffffff;
        --text-muted: #98989d;
        --success: #30d158;
        --warning: #ff9f0a;
        --danger: #ff453a;
        --info: #0a84ff;

        --camera: #0a84ff;
        --sound: #30d158;
        --grip: #ff9f0a;
        --electric: #ffd60a;
        --art: #bf5af2;
        --wardrobe: #ff2d55;
        --makeup: #ff375f;
        --production: #64d2ff;
        --directing: #00c7be;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--dark);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
      }

      .header {
        background: linear-gradient(135deg, var(--primary) 0%, #ff6b6b 100%);
        padding: 1.5rem 2rem;
        box-shadow: 0 4px 20px rgba(255, 45, 85, 0.3);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header h1 {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .header h1 i {
        margin-right: 10px;
      }

      .header p {
        font-size: 0.9rem;
        opacity: 0.9;
        margin-top: 5px;
      }

      .nav {
        display: flex;
        gap: 0.5rem;
        padding: 1rem 2rem;
        background: var(--medium);
        border-bottom: 2px solid var(--primary);
        overflow-x: auto;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
      }

      .nav-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        padding: 0.75rem 1.25rem;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav-btn i {
        font-size: 1rem;
      }

      .nav-btn:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.1);
      }

      .nav-btn.active {
        background: var(--primary);
        color: white;
      }

      .container {
        padding: 2rem;
        max-width: 1400px;
        margin: 0 auto;
      }

      .card {
        background: var(--medium);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .card-title {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: var(--secondary);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: var(--dark);
        border-radius: 12px;
        padding: 1.5rem;
        border: 2px solid var(--primary);
        transition: all 0.2s;
      }

      .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(255, 45, 85, 0.3);
      }

      .stat-number {
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--secondary);
        line-height: 1;
      }

      .stat-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--secondary);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        background: var(--dark);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        transition: all 0.2s;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 45, 85, 0.2);
      }

      .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 45, 85, 0.3);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .btn-success {
        background: var(--success);
        color: white;
      }

      .btn-warning {
        background: var(--warning);
        color: white;
      }

      .btn-danger {
        background: var(--danger);
        color: white;
      }

      .btn-sm {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
      }

      .project-list {
        display: grid;
        gap: 1rem;
      }

      .project-item {
        background: var(--dark);
        border-radius: 12px;
        padding: 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
      }

      .project-item:hover {
        border-color: var(--primary);
        transform: translateX(5px);
      }

      .project-info h3 {
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
      }

      .project-meta {
        display: flex;
        gap: 1rem;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .project-stats {
        display: flex;
        gap: 1rem;
      }

      .project-stat {
        text-align: center;
        padding: 0 1rem;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
      }

      .project-stat .number {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--secondary);
      }

      .project-stat .label {
        font-size: 0.7rem;
        color: var(--text-muted);
      }

      .invite-box {
        background: var(--dark);
        border: 2px dashed var(--success);
        border-radius: 12px;
        padding: 1rem;
        margin: 1rem 0;
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .invite-box input {
        flex: 1;
        background: var(--medium);
        border: none;
      }

      .crew-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1rem;
      }

      .crew-card {
        background: var(--dark);
        border-radius: 12px;
        padding: 1.25rem;
        border-left: 4px solid;
        transition: all 0.2s;
      }

      .crew-card.warning {
        border-left-color: var(--warning);
        background: linear-gradient(
          90deg,
          rgba(255, 159, 10, 0.1),
          transparent
        );
      }

      .crew-card.danger {
        border-left-color: var(--danger);
        background: linear-gradient(90deg, rgba(255, 69, 58, 0.1), transparent);
      }

      .crew-card.dept-camera {
        border-left-color: var(--camera);
      }
      .crew-card.dept-sound {
        border-left-color: var(--sound);
      }
      .crew-card.dept-grip {
        border-left-color: var(--grip);
      }
      .crew-card.dept-electric {
        border-left-color: var(--electric);
      }
      .crew-card.dept-art {
        border-left-color: var(--art);
      }
      .crew-card.dept-wardrobe {
        border-left-color: var(--wardrobe);
      }
      .crew-card.dept-production {
        border-left-color: var(--production);
      }

      .crew-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 0.75rem;
      }

      .crew-name {
        font-size: 1.1rem;
        font-weight: 700;
      }

      .crew-department {
        font-size: 0.8rem;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.1);
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
      }

      .crew-details {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin: 0.5rem 0;
      }

      .crew-badges {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      .badge {
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 600;
      }

      .badge-warning {
        background: rgba(255, 159, 10, 0.2);
        color: var(--warning);
        border: 1px solid var(--warning);
      }

      .badge-danger {
        background: rgba(255, 69, 58, 0.2);
        color: var(--danger);
        border: 1px solid var(--danger);
      }

      .badge-success {
        background: rgba(48, 209, 88, 0.2);
        color: var(--success);
        border: 1px solid var(--success);
      }

      #calendar {
        background: var(--dark);
        border-radius: 12px;
        padding: 1rem;
        margin: 1rem 0;
      }

      .fc {
        background: var(--dark);
        color: var(--text);
      }

      .fc-toolbar-title {
        color: var(--text) !important;
      }

      .fc-button {
        background: var(--medium) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: var(--text) !important;
      }

      .fc-button:hover {
        background: var(--primary) !important;
      }

      .fc-day {
        background: var(--medium);
      }

      .fc-day-today {
        background: rgba(255, 45, 85, 0.1) !important;
      }

      .department-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0.75rem;
        margin: 1rem 0;
      }

      .dept-btn {
        background: var(--dark);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 1rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .dept-btn:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
      }

      .dept-btn .count {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      .conflict-item {
        background: rgba(255, 69, 58, 0.1);
        border-left: 4px solid var(--danger);
        padding: 1rem;
        margin-bottom: 0.5rem;
        border-radius: 0 8px 8px 0;
      }

      .conflict-suggestion {
        background: var(--dark);
        padding: 0.75rem;
        margin-top: 0.5rem;
        border-radius: 6px;
        font-size: 0.9rem;
        color: var(--success);
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
      }

      .modal-content {
        background: var(--medium);
        border-radius: 16px;
        padding: 2rem;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .modal-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.5rem;
        cursor: pointer;
      }

      .action-buttons {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
        flex-wrap: wrap;
      }

      .delete-confirm {
        background: rgba(255, 69, 58, 0.1);
        border-left: 4px solid var(--danger);
        padding: 1rem;
        margin: 1rem 0;
        border-radius: 0 8px 8px 0;
      }

      .checkbox-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        margin-top: 0.5rem;
      }

      .checkbox-item {
        background: var(--dark);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .checkbox-item:hover {
        border-color: var(--primary);
        background: rgba(255, 45, 85, 0.05);
      }

      .checkbox-item.selected {
        border-color: var(--primary);
        background: rgba(255, 45, 85, 0.1);
      }

      .checkbox-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--primary);
      }

      /* Schedule Day Cards */
      .day-card {
        background: var(--dark);
        border-radius: 12px;
        margin-bottom: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .day-header {
        padding: 1rem;
        background: var(--medium);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        border-bottom: 2px solid var(--primary);
      }

      .day-header:hover {
        background: rgba(255, 45, 85, 0.1);
      }

      .day-date {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--secondary);
        margin-right: 1rem;
      }

      .day-count {
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .expand-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
      }

      .expand-btn:hover {
        color: var(--primary);
      }

      /* Department Sections */
      .day-departments {
        padding: 1rem;
      }

      .department-section {
        margin-bottom: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        overflow: hidden;
      }

      .dept-header {
        padding: 0.75rem 1rem;
        background: var(--medium);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .dept-header:hover {
        background: rgba(255, 45, 85, 0.1);
      }

      .dept-name {
        font-weight: 600;
        color: var(--secondary);
        margin-right: 0.5rem;
      }

      .dept-count {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .dept-selected-count {
        font-size: 0.8rem;
        color: var(--success);
        margin-right: 0.5rem;
      }

      .dept-arrow {
        transition: transform 0.2s;
      }

      .dept-members {
        padding: 0.5rem;
        background: var(--dark);
      }

      .member-item {
        display: flex;
        align-items: center;
        padding: 0.5rem;
        margin: 0.25rem 0;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .member-item:hover {
        background: rgba(255, 45, 85, 0.1);
      }

      .member-item.selected {
        background: rgba(48, 209, 88, 0.1);
        border-left: 3px solid var(--success);
      }

      .member-item input[type="checkbox"] {
        margin-right: 0.75rem;
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--primary);
      }

      .member-name {
        flex: 1;
        font-size: 0.95rem;
      }

      .member-item .badge {
        margin-left: 0.25rem;
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
      }

      /* Department action buttons */
      .dept-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
        padding: 0.5rem 1rem;
        background: var(--medium);
        border-radius: 6px;
      }

      .dept-action-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-muted);
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .dept-action-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }

      .dept-action-btn.select-all {
        color: var(--success);
        border-color: var(--success);
      }

      .dept-action-btn.select-all:hover {
        background: rgba(48, 209, 88, 0.1);
      }

      .dept-action-btn.deselect-all {
        color: var(--danger);
        border-color: var(--danger);
      }

      .dept-action-btn.deselect-all:hover {
        background: rgba(255, 69, 58, 0.1);
      }

      @media (max-width: 768px) {
        .container {
          padding: 1rem;
        }

        .form-row {
          grid-template-columns: 1fr;
        }

        .project-item {
          flex-direction: column;
          align-items: start;
          gap: 1rem;
        }

        .project-stats {
          width: 100%;
          justify-content: space-around;
        }

        .nav {
          padding: 0.5rem 1rem;
        }

        .action-buttons {
          flex-direction: column;
          width: 100%;
        }

        .action-buttons .btn {
          width: 100%;
        }

        .checkbox-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="header">
        <h1><i class="fas fa-film"></i> FilmFlow Admin</h1>
        <p>Production Management Dashboard</p>
      </div>

      <div class="nav" id="navigation">
        <button class="nav-btn" data-view="projects">
          <i class="fas fa-folder"></i> Projects
        </button>
        <button class="nav-btn active" data-view="crew">
          <i class="fas fa-users"></i> Crew
        </button>
        <button class="nav-btn" data-view="schedule">
          <i class="fas fa-calendar-alt"></i> Schedule
        </button>
        <button class="nav-btn" data-view="callsheets">
          <i class="fas fa-file-pdf"></i> Call Sheets
        </button>
      </div>

      <div class="container" id="main-content"></div>
    </div>

    <script>
      const API_BASE_URL = "https://filmflow-api.onrender.com/api";

      // Constants
      const DEPARTMENTS = [
        "Camera",
        "Sound",
        "Grip",
        "Electric",
        "Art Department",
        "Wardrobe",
        "Hair & Makeup",
        "Production",
        "Directing",
        "Editing",
        "VFX",
        "Catering",
        "Transportation",
        "Locations",
        "Safety",
        "Script Supervisor",
        "Stunt Coordination",
        "Special Effects",
        "Props",
        "Set Decoration",
        "Construction",
      ];

      const DIETARY_OPTIONS = [
        "Vegetarian",
        "Vegan",
        "Gluten-Free",
        "Nut Allergy",
        "Dairy-Free",
        "Halal",
        "Kosher",
        "Shellfish Allergy",
      ];

      // State
      let currentView = "crew";
      let projects = [];
      let currentProject = null;
      let crew = [];
      let schedule = [];
      let conflicts = [];

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        loadProjects();
        setupNavigation();
      });

      // Navigation
      function setupNavigation() {
        document.querySelectorAll(".nav-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".nav-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentView = btn.dataset.view;
            renderView();
          });
        });
      }

      // Helper Functions
      function getDietaryIcon(diet) {
        const icons = {
          Vegetarian: "🥗",
          Vegan: "🌱",
          "Gluten-Free": "🌾",
          "Nut Allergy": "🥜",
          "Dairy-Free": "🥛",
          Halal: "☪️",
          Kosher: "✡️",
          "Shellfish Allergy": "🦐",
        };
        return icons[diet] || "📋";
      }

      function formatDate(dateString) {
        return new Date(dateString).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function formatDateRange(start, end) {
        return `${formatDate(start)} - ${formatDate(end)}`;
      }

      function getInviteLink(code) {
        return `${window.location.origin}/crew-signup.html?project=${code}`;
      }

      function getCrewCardClass(member) {
        if (!member.emergency_name) return "danger";
        if (
          !member.dietary_restrictions ||
          member.dietary_restrictions.length === 0
        )
          return "warning";
        if (!member.has_insurance) return "warning";
        return "";
      }

      function getCrewByDepartment() {
        const byDept = {};
        crew.forEach((m) => {
          if (!byDept[m.department]) byDept[m.department] = [];
          byDept[m.department].push(m);
        });
        return Object.entries(byDept);

      async function createProject(projectData) {
        try {
          const response = await fetch(`${API_BASE_URL}/projects`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(projectData),

          showNotification("Project created successfully!", "success");

      async function deleteProject(projectId) {
        const project = projects.find((p) => p.id === projectId);

        if (
          !confirm(
            `⚠️ Are you sure you want to delete "${project?.name}"?\n\nThis will permanently delete:\n• All crew signups\n• All schedule assignments\n• All call sheets\n\nThis action CANNOT be undone!`,
          )
        ) {
          return;
        }

        const confirmText = prompt(
          'Type "DELETE" to confirm permanent deletion:',
        );
        if (confirmText !== "DELETE") {
          showNotification("Deletion cancelled", "info");
          return;
        }

        try {
          showNotification("Deleting project...", "info");

          const response = await fetch(
            `${API_BASE_URL}/projects/${projectId}`,
            {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
            },
          );

          const data = await response.json();

          if (response.ok) {
            showNotification(
              `Project "${project?.name}" deleted successfully`,
              "success",
            );
            if (currentProject?.id === projectId) {
              currentProject = null;
            }
            loadProjects();
          } else {
            throw new Error(data.error || "Failed to delete project");
          }
        } catch (error) {
          console.error("Error deleting project:", error);
          showNotification("Failed to delete project", "error");
        }
      }

      async function deleteCrewMember(crewId, projectId) {
        const crewMember = crew.find((c) => c.id === crewId);

        if (
          !confirm(
            `⚠️ Are you sure you want to delete "${crewMember?.full_name}"?\n\nThis will permanently remove them from this project and all schedules.\n\nThis action CANNOT be undone!`,
          )
        ) {
          return;
        }

        const confirmText = prompt(
          `Type "DELETE" to confirm permanent deletion of ${crewMember?.full_name}:`,
        );
        if (confirmText !== "DELETE") {
          showNotification("Deletion cancelled", "info");
          return;
        }

        try {
          showNotification(`Deleting ${crewMember?.full_name}...`, "info");

          const response = await fetch(`${API_BASE_URL}/crew/${crewId}`, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
          });

          const data = await response.json();

          if (response.ok) {
            showNotification(
              `${crewMember?.full_name} deleted successfully`,
              "success",

            // Refresh crew list

              await loadProjectCrew(currentProject.id);

            throw new Error(data.error || "Failed to delete crew member");

          showNotification("Failed to delete crew member", "error");
        }

      async function assignDepartment(projectId, department, date) {
        try {
          const response = await fetch(
            `${API_BASE_URL}/schedule/assign-department`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                project_id: projectId,
                department,
                shoot_date: date,
              }),
            },
          );
          const data = await response.json();
          if (data.hasConflicts) {
            showNotification(
              `Assigned with ${data.conflicts} conflicts`,
              "warning",
            );
          } else {
            showNotification(
              `Assigned ${data.assigned} crew members`,
              "success",
            );

          loadSchedule(projectId);
          return data;
        } catch (error) {
          console.error("Error assigning department:", error);
          showNotification("Failed to assign department", "error");
        }

          const response = await fetch(`${API_BASE_URL}/callsheet/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project_id: projectId, ...data }),
          });

          if (result.success) {
            showNotification(
              `Call sheet sent to ${result.crew_count} crew members`,

          showNotification("Failed to generate call sheet", "error");

      async function saveCrewChanges(crewId) {
        try {
          const dietaryRestrictions = [];
          document
            .querySelectorAll(
              '#edit-dietary-grid input[type="checkbox"]:checked',
            )
            .forEach((cb) => {
              dietaryRestrictions.push(cb.value);
            });

          const updatedData = {
            full_name: document.getElementById("edit-full_name")?.value,
            phone: document.getElementById("edit-phone")?.value,
            email: document.getElementById("edit-email")?.value,
            department: document.getElementById("edit-department")?.value,
            emergency_name:
              document.getElementById("edit-emergency_name")?.value || null,
            emergency_phone:
              document.getElementById("edit-emergency_phone")?.value || null,
            dietary_restrictions: dietaryRestrictions,
            address: document.getElementById("edit-address")?.value || null,
            union_status:
              document.getElementById("edit-union_status")?.value || null,
            has_insurance:
              document.getElementById("edit-has_insurance")?.checked || false,
            insurance_expiry: null,
            certifications: [],
          };

          if (
            !updatedData.full_name ||
            !updatedData.phone ||
            !updatedData.email ||
            !updatedData.department
          ) {
            alert("Please fill in all required fields");
            return;
          }

          showNotification("Updating crew member...", "info");

          const response = await fetch(`${API_BASE_URL}/crew/profile`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(updatedData),
          });

          const data = await response.json();

          if (data.error) {
            throw new Error(data.error);
          }

          document.querySelector(".modal")?.remove();

          showNotification("Crew member updated successfully!", "success");

          if (currentProject) {
            await loadProjectCrew(currentProject.id);
            renderView();
          }
        } catch (error) {
          console.error("Error updating crew:", error);
          showNotification("Failed to update crew member", "error");
        }
      }

      // Helper function to get all dates between start and end
      function getDatesBetween(start, end) {
        const dates = [];
        let currentDate = new Date(start);
        const endDate = new Date(end);

        while (currentDate <= endDate) {
          dates.push(new Date(currentDate).toISOString().split("T")[0]);
          currentDate.setDate(currentDate.getDate() + 1);
        }
        return dates;
      }

                         value="${member.id}" 
                         data-date="${date}"

      // Get badges for member (dietary, insurance, etc.)

      // Attach event listeners for schedule interactions
      function attachScheduleListeners(crewByDept, workingSchedule) {
        // Store working schedule globally for save/reset
        window.workingSchedule = workingSchedule;
        window.crewByDept = crewByDept;
      }

      // Toggle day expansion
      window.toggleDayExpand = (date) => {
        const daySection = document.getElementById(`day-${date}`);
        const expandBtn = event.currentTarget;
        const icon = expandBtn.querySelector("i");

        if (daySection.style.display === "none") {
          daySection.style.display = "block";
          icon.className = "fas fa-chevron-up";
        } else {
          daySection.style.display = "none";
          icon.className = "fas fa-chevron-down";
        }
      };

      // Toggle department expansion
      window.toggleDepartment = (date, dept) => {
        const deptSection = document.getElementById(`dept-${date}-${dept}`);
        const header = event.currentTarget;
        const arrow = header.querySelector(".dept-arrow");

        if (deptSection.style.display === "none") {
          deptSection.style.display = "block";
          arrow.style.transform = "rotate(90deg)";
        } else {
          deptSection.style.display = "none";
          arrow.style.transform = "rotate(0deg)";
        }
      };

      // Toggle individual member
      // Toggle individual member
      window.toggleMember = (date, memberId, checked) => {
        // Initialize working schedule for this date if needed
        if (!window.workingSchedule[date]) {
          window.workingSchedule[date] = [];
        }

        // Find the member to get their department
        const member = crew.find((c) => c.id === memberId);
        if (!member) return;

        if (checked) {
          // Check if member already exists in schedule
          const exists = window.workingSchedule[date].some(
            (a) => a.crew_id === memberId,
          );
          if (!exists) {
            window.workingSchedule[date].push({
              crew_id: memberId,
              department: member.department,
              call_time: "06:00", // Default call time
            });
          }
        } else {
          // Remove member from schedule
          window.workingSchedule[date] = window.workingSchedule[date].filter(
            (a) => a.crew_id !== memberId,
          );
        }

        // Update selected count for department
        const selectedCount =
          window.workingSchedule[date]?.filter(
            (a) =>
              crew.find((c) => c.id === a.crew_id)?.department ===
              member.department,
          ).length || 0;

        const countSpan = document.getElementById(
          `selected-${date}-${member.department}`,
        );
        if (countSpan) {
          countSpan.textContent = `${selectedCount} selected`;
        }

        // Update day count
        updateDayCount(date);

        // Log for debugging
        console.log(
          `Updated ${date}: ${window.workingSchedule[date].length} members`,
        );
      };

      // Update the crew count for a specific day
      function updateDayCount(date) {
        const assignedCount = window.workingSchedule[date]?.length || 0;
        const dayCard = document.querySelector(
          `.day-card[data-date="${date}"] .day-count`,
        );
        if (dayCard) {
          dayCard.textContent = `${assignedCount} crew assigned`;
        }
      }

      // Reset all changes to original schedule
      window.resetSchedule = async () => {
        if (confirm("Reset all unsaved changes?")) {
          await loadSchedule(currentProject.id);
          window.workingSchedule = JSON.parse(JSON.stringify(schedule));
          renderScheduleView(document.getElementById("main-content"));
        }
      };

      // Save all changes to database
      // Save all changes to database
      window.saveSchedule = async () => {
        try {
          showNotification("Saving schedule changes...", "info");

          // Get all assignments from working schedule
          const assignments = [];
          for (const [date, crewList] of Object.entries(
            window.workingSchedule,
          )) {
            for (const assignment of crewList) {
              // Make sure we have all required fields
              assignments.push({
                project_id: currentProject.id,
                crew_id: assignment.crew_id,
                shoot_date: date,
                call_time: assignment.call_time || "06:00",
                department: assignment.department,
              });
            }
          }

          console.log("Assignments to save:", assignments);

          if (assignments.length === 0) {
            showNotification("No assignments to save", "info");
            return;
          }

          // Instead of clearing all at once, we'll update each assignment individually
          // This is more reliable than trying to clear first
          let successCount = 0;
          let failCount = 0;

          for (const assignment of assignments) {
            try {
              const response = await fetch(`${API_BASE_URL}/schedule/assign`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(assignment),
              });

              if (response.ok) {
                successCount++;
              } else {
                const errorData = await response.json();
                console.error(
                  "Failed to save assignment:",
                  assignment,
                  errorData,
                );
                failCount++;
              }
            } catch (err) {
              console.error("Error saving assignment:", assignment, err);
              failCount++;
            }

            // Small delay to avoid overwhelming the server
            await new Promise((r) => setTimeout(r, 100));
          }

          if (failCount === 0) {
            showNotification(
              `✅ Successfully saved ${successCount} crew assignments!`,
              "success",
            );
          } else {
            showNotification(
              `⚠️ Saved ${successCount} assignments, ${failCount} failed`,
              "warning",
            );
          }

          // Reload schedule to get fresh data
          await loadSchedule(currentProject.id);
          window.workingSchedule = JSON.parse(JSON.stringify(schedule));

          // Refresh the view to show updated data
          renderScheduleView(document.getElementById("main-content"));
        } catch (error) {
          console.error("Error saving schedule:", error);
          showNotification(
            "❌ Failed to save schedule: " + error.message,
            "error",
          );
        }
      };

      // Bulk assign entire department
      window.assignDepartment = (date, department) => {
        const members = crew.filter((c) => c.department === department);

        members.forEach((member) => {
          const checkbox = document.querySelector(
            `input[type="checkbox"][data-date="${date}"][value="${member.id}"]`,
          );
          if (checkbox && !checkbox.checked) {
            checkbox.checked = true;
            toggleMember(date, member.id, true);
          }
        });
      };

      // Bulk remove entire department
      window.removeDepartment = (date, department) => {
        const members = crew.filter((c) => c.department === department);

        members.forEach((member) => {
          const checkbox = document.querySelector(
            `input[type="checkbox"][data-date="${date}"][value="${member.id}"]`,
          );
          if (checkbox && checkbox.checked) {
            checkbox.checked = false;
            toggleMember(date, member.id, false);
          }
        });
      };

      function initCalendar() {
        const calendarEl = document.getElementById("calendar");
        if (!calendarEl) return;

        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: "dayGridMonth",
          headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "dayGridMonth,dayGridWeek",
          },
          events: schedule.map((day) => ({
            title: `${day.total} crew`,
            start: day.date,
            backgroundColor:
              day.total > 0 ? "var(--success)" : "var(--text-muted)",
            borderColor: "transparent",
            extendedProps: { crew: day.crew },
          })),
          dateClick: function (info) {
            const crewCount =
              schedule.find((d) => d.date === info.dateStr)?.total || 0;
            if (crewCount > 0) {
              alert(`Crew assigned: ${crewCount} members`);
            } else {
              if (
                confirm("No crew assigned. Assign department to this date?")
              ) {
                const dept = prompt("Enter department name:");
                if (dept && currentProject) {
                  assignDepartment(currentProject.id, dept, info.dateStr);
                }
              }
            }
          },
          eventDidMount: function (info) {
            if (info.event.extendedProps.crew) {
              const hasConflicts = info.event.extendedProps.crew.some(
                (c) => c.conflict,
              );
              if (hasConflicts) {
                info.el.style.backgroundColor = "var(--warning)";
              }
            }
          },
        });

        calendar.render();
      }

      window.handleGenerateCallSheet = async () => {
        const date = document.getElementById("callsheet-date").value;
        const call_time = document.getElementById("callsheet-time").value;
        const location = document.getElementById("callsheet-location").value;
        const scenes = document.getElementById("callsheet-scenes").value;
        const ad_notes = document.getElementById("callsheet-ad-notes").value;

        if (!date) {
          showNotification("Please select a date", "error");
          return;
        }

        await generateCallSheet(currentProject.id, {
          shoot_date: date,
          call_time,
          location,
          scenes,
          ad_notes,
        });
      };

      window.editProjectDates = async (projectId) => {
        const project = projects.find((p) => p.id === projectId);

        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
          <div class="modal-content" style="max-width: 400px;">
              <div class="modal-header">
                  <h2 style="color: var(--secondary);">Edit Project Dates</h2>
                  <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
              </div>
              <div style="padding: 1rem;">
                  <h3 style="margin-bottom: 1rem;">${project.name}</h3>
                  <div class="form-group">
                      <label>Start Date</label>
                      <input type="date" id="edit-start-date" value="${project.start_date}" class="form-control">
                  </div>
                  <div class="form-group">
                      <label>End Date</label>
                      <input type="date" id="edit-end-date" value="${project.end_date}" class="form-control">
                  </div>
                  <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                      <button class="btn btn-success" style="flex: 1;" onclick="saveProjectDates(${project.id})">
                          <i class="fas fa-save"></i> Save
                      </button>
                      <button class="btn btn-secondary" style="flex: 1;" onclick="this.closest('.modal').remove()">
                          Cancel
                      </button>
                  </div>
              </div>
          </div>
        `;
        document.body.appendChild(modal);
      };

      window.saveProjectDates = async (projectId) => {
        const newStart = document.getElementById("edit-start-date")?.value;
        const newEnd = document.getElementById("edit-end-date")?.value;

        if (!newStart || !newEnd) {
          alert("Please select both dates");
          return;
        }

        try {
          showNotification("Updating project dates...", "info");

          const response = await fetch(
            `${API_BASE_URL}/projects/${projectId}`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                start_date: newStart,
                end_date: newEnd,
              }),
            },
          );

          const data = await response.json();

          if (data.project) {
            document.querySelector(".modal")?.remove();
            showNotification("Project dates updated!", "success");
            loadProjects();
          }
        } catch (error) {
          console.error("Error updating project:", error);
          showNotification("Failed to update project", "error");
        }
      };

      window.toggleProjectStatus = async (projectId) => {
        const project = projects.find((p) => p.id === projectId);
        const newStatus = project.status === "active" ? "completed" : "active";
        const action = newStatus === "completed" ? "complete" : "reopen";

        if (!confirm(`Are you sure you want to ${action} "${project.name}"?`)) {
          return;
        }

        try {
          showNotification(
            `${action === "complete" ? "Completing" : "Reopening"} project...`,
            "info",
          );

          const response = await fetch(
            `${API_BASE_URL}/projects/${projectId}`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ status: newStatus }),
            },
          );

          const data = await response.json();

          if (data.project) {
            showNotification(
              `Project ${newStatus === "completed" ? "completed" : "reopened"}!`,
              "success",
            );
            loadProjects();
          }
        } catch (error) {
          console.error("Error updating project status:", error);
          showNotification("Failed to update project status", "error");
        }
      };
    </script>
  </body>
</html>
